symbol: BTC/USDT
timeframe: 15m
higher_timeframe: 1h

# Venue: cex (Binance via CCXT) | evm (on-chain DEX) | mt5 (MetaTrader 5 bridge)
venue: cex

# SMC parameters
swing_lookback: 5
order_block_lookback: 20
fvg_min_size_pct: 0.001
liquidity_tolerance_pct: 0.0005

# Risk management
risk_per_trade_pct: 1.0
reward_risk_ratio: 2.0
max_open_trades: 1

# Paper trading
initial_balance: 10000.0
poll_interval_sec: 30

# EVM settings (when venue: evm)
evm_chain: base
evm_slippage_pct: 0.5

# MT5 settings (when venue: mt5) — connection details go in .env
# Symbol name must match your broker exactly, including any suffix
# (e.g. EURUSD, XAUUSD, BTCUSD, EURUSD.r). Timeframe reuses the same
# strings as above (1m/5m/15m/30m/1h/4h/1d).
mt5_symbol: EURUSD
mt5_timeframe: 15m

# Backtest defaults
backtest_bars: 2000

# Hyperliquid DeFi wallet + perps (long/short on one venue, testnet by default)
hyperliquid:
  testnet: true
  default_leverage: 3
  # Majors — PAXG is tokenized gold; XMR is a listed perp (no Monero-chain custody)
  majors: [BTC, ETH, SOL, HYPE, XMR, PAXG]
  # Sample memecoins (k-prefixed = 1000x-denominated on Hyperliquid)
  memecoins: [kPEPE, WIF, POPCAT, FARTCOIN, TRUMP, DOGE, GOAT, MOODENG, PNUT, kBONK, kSHIB, MELANIA]

# Trade screening — a signal must clear ALL of these before it is approved to trade
screening:
  min_confidence: 0.55     # SMC confluence score floor
  min_rr: 2.0              # minimum reward:risk
  sniper_confidence: 0.65  # confidence required for a "sniper" entry
  max_stop_pct: 0.02       # tightest invalidation for a sniper entry (2%)
  ote_low: 0.618           # Fibonacci golden-pocket bounds (OTE zone)
  ote_high: 0.786
